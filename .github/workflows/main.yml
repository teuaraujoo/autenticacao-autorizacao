name: CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn typecheck

      - run: yarn lint

      - run: yarn build
