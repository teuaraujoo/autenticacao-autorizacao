name: CI

on:
  push:
    branches:
      - main
jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: api/yarn.lock

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn build